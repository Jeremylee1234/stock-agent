<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Test 4 — analysis_chunk 内容累积拼接</title>
  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { font-size: 18px; margin-bottom: 8px; }
    .meta { color: #8b949e; font-size: 12px; margin-bottom: 24px; }
    #result {
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    #result.pass { background: rgba(63,185,80,0.15); border: 1px solid #3fb950; color: #3fb950; }
    #result.fail { background: rgba(248,81,73,0.15); border: 1px solid #f85149; color: #f85149; }
    #result.pending { background: rgba(88,166,255,0.1); border: 1px solid #58a6ff; color: #58a6ff; }
    pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #8b949e;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Property Test 4: analysis_chunk 内容累积拼接</h1>
  <div class="meta">
    Validates: Requirements 1.3, 2.2 &nbsp;|&nbsp;
    Feature: stock-agent-desktop-ui &nbsp;|&nbsp;
    Framework: fast-check (CDN)
  </div>

  <div id="result" class="pending">⏳ 运行中...</div>
  <pre id="detail"></pre>

  <script type="module">
    // Feature: stock-agent-desktop-ui, Property 4: analysis_chunk 内容累积拼接

    import * as fc from 'https://cdn.jsdelivr.net/npm/fast-check@3/+esm';

    // ─── Minimal re-implementation of the logic under test ───────────────────

    /**
     * Minimal session state — reset before each property run.
     */
    function makeSession() {
      return { stages: {} };
    }

    /**
     * createThinkingBlock — mirrors the production implementation.
     * Creates the DOM structure and stores it in session.stages[stage].
     * @param {object} session
     * @param {string} stage
     * @param {string} title
     */
    function createThinkingBlock(session, stage, title) {
      const block = document.createElement('div');
      block.className = 'thinking-block expanded';
      block.dataset.stage = stage;

      block.innerHTML = `
        <div class="tb-header">
          <span class="tb-title">${title}</span>
        </div>
        <div class="tb-body">
          <div class="tb-content"></div>
        </div>
      `;

      session.stages[stage] = {
        stage,
        title,
        status: 'running',
        content: '',
        element: block,
      };
    }

    /**
     * appendChunk — mirrors the production implementation.
     * Appends content to the ThinkingBlock's .tb-content textContent.
     * @param {object} session
     * @param {string} stage
     * @param {string} content
     */
    function appendChunk(session, stage, content) {
      const stageData = session.stages[stage];
      if (!stageData || !stageData.element) return;
      stageData.content += content;
      const contentEl = stageData.element.querySelector('.tb-content');
      if (contentEl) contentEl.textContent = stageData.content;
    }

    // ─── Property 4 ──────────────────────────────────────────────────────────

    const resultEl = document.getElementById('result');
    const detailEl = document.getElementById('detail');

    try {
      fc.assert(
        fc.property(
          fc.array(fc.string(), { minLength: 1 }),  // N ≥ 1 chunks
          (chunks) => {
            // Setup: fresh session + ThinkingBlock for "test_stage"
            const session = makeSession();
            createThinkingBlock(session, 'test_stage', 'Test Stage');

            // Act: call appendChunk for each chunk in order
            for (const chunk of chunks) {
              appendChunk(session, 'test_stage', chunk);
            }

            // Assert: .tb-content textContent === chunks joined in order
            const contentEl = session.stages['test_stage'].element.querySelector('.tb-content');
            const expected = chunks.join('');
            return contentEl.textContent === expected;
          }
        ),
        { numRuns: 100 }
      );

      // PASS
      resultEl.className = 'pass';
      resultEl.textContent = '✓ PASS — Property 4 通过（100 次运行）';
      detailEl.textContent =
        '对任意 N ≥ 1 个 chunk 序列，处理后 ThinkingBlock 的 .tb-content textContent\n' +
        '等于所有 content 按顺序拼接的结果。\n\n' +
        '验证需求：1.3, 2.2';
      console.log('[Property 4] PASS');

    } catch (err) {
      // FAIL
      resultEl.className = 'fail';
      resultEl.textContent = '✗ FAIL — Property 4 失败';
      detailEl.textContent = String(err);
      console.error('[Property 4] FAIL', err);
    }
  </script>
</body>
</html>
